<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20.0 -20 1157.6 765" width="1157.6" height="765" style="background-color: white">
  <defs>
    <marker id="seq-arrow" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 10 5, 0 10" fill="#333333" />
    </marker>
    <marker id="seq-arrow-open" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 10 5, 0 10" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
    <marker id="seq-cross" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#333333" stroke-width="1.5" />
      <line x1="10" y1="0" x2="0" y2="10" stroke="#333333" stroke-width="1.5" />
    </marker>
    <marker id="seq-async" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 10 5, 0 10" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
  </defs>
  <style>.seq-participant rect { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-participant text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
.seq-lifeline { stroke: #9370DB; stroke-width: 1; stroke-dasharray: 5,5; }
.seq-message line, .seq-message path { stroke: #333333; stroke-width: 1; }
.seq-message text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-activation { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-note rect { fill: #ffffcc; stroke: #aaaa33; stroke-width: 1; }
.seq-note text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-fragment rect { fill: none; stroke: #9370DB; stroke-width: 1; stroke-dasharray: 3,3; }
.seq-fragment text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 11px; font-weight: bold; }
.seq-actor line, .seq-actor circle { stroke: #9370DB; stroke-width: 1; fill: none; }
.seq-actor text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
</style>
  <line class="seq-lifeline" x1="70" y1="80" x2="70" y2="715" />
  <line class="seq-lifeline" x1="458.4" y1="60" x2="458.4" y2="715" />
  <line class="seq-lifeline" x1="736.9" y1="60" x2="736.9" y2="715" />
  <line class="seq-lifeline" x1="1047.6" y1="60" x2="1047.6" y2="715" />
  <g class="seq-fragment">
    <rect x="10" y="320" width="1097.6" height="75" />
    <rect x="10" y="320" width="34" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="334">ALT</text>
    <text x="49" y="334">[status = up_to_date]</text>
  </g>
  <g class="seq-fragment">
    <rect x="10" y="395" width="1097.6" height="75" />
    <rect x="10" y="395" width="42" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="409">ELSE</text>
    <text x="57" y="409">[status = error]</text>
  </g>
  <g class="seq-fragment">
    <rect x="10" y="470" width="1097.6" height="255" />
    <rect x="10" y="470" width="42" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="484">ELSE</text>
    <text x="57" y="484">[status = needs_update / may_need_update]</text>
  </g>
  <g class="seq-message">
    <line x1="70" y1="120" x2="458.4" y2="120" marker-end="url(#seq-arrow)" />
    <text x="264.2" text-anchor="middle" y="115">/ai-placeholder file.md</text>
  </g>
  <g class="seq-message">
    <line x1="458.4" y1="160" x2="736.9" y2="160" marker-end="url(#seq-arrow)" />
    <text x="597.65" text-anchor="middle" y="155">ai_context(file, name)</text>
  </g>
  <g class="seq-message">
    <line x1="736.9" y1="200" x2="1047.6" y2="200" marker-end="url(#seq-arrow)" />
    <text x="892.25" text-anchor="middle" y="195">read</text>
  </g>
  <g class="seq-message">
    <line x1="1047.6" y1="240" x2="736.9" y2="240" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="892.25" text-anchor="middle" y="235">content</text>
  </g>
  <g class="seq-message">
    <line x1="736.9" y1="280" x2="458.4" y2="280" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="597.65" text-anchor="middle" y="275">status</text>
  </g>
  <g class="seq-message">
    <line x1="458.4" y1="345" x2="70" y2="345" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="264.2" text-anchor="middle" y="340">skipped (all checksums match)</text>
  </g>
  <g class="seq-message">
    <line x1="458.4" y1="420" x2="70" y2="420" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="264.2" text-anchor="middle" y="415">error — manual edits detected, run ai-fix first</text>
  </g>
  <g class="seq-message">
    <path d="M 458.4 495 L 478.4 495 L 478.4 510 L 458.4 510" fill="none" marker-end="url(#seq-arrow)" />
    <text x="483.4" text-anchor="middle" y="490">generate content from prompt + context</text>
  </g>
  <g class="seq-message">
    <line x1="458.4" y1="555" x2="736.9" y2="555" marker-end="url(#seq-arrow)" />
    <text x="597.65" text-anchor="middle" y="550">ai_update(file, name, new_content)</text>
  </g>
  <g class="seq-message">
    <line x1="736.9" y1="595" x2="1047.6" y2="595" marker-end="url(#seq-arrow)" />
    <text x="892.25" text-anchor="middle" y="590">write content + checksums atomically</text>
  </g>
  <g class="seq-message">
    <line x1="736.9" y1="635" x2="458.4" y2="635" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="597.65" text-anchor="middle" y="630">OK</text>
  </g>
  <g class="seq-message">
    <line x1="458.4" y1="675" x2="70" y2="675" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="264.2" text-anchor="middle" y="670">updated</text>
  </g>
  <g class="seq-actor" data-participant-id="User">
    <circle cx="70" cy="32" r="10" />
    <line x1="70" y1="42" x2="70" y2="57" />
    <line x1="55" y1="47" x2="85" y2="47" />
    <line x1="70" y1="57" x2="58" y2="65" />
    <line x1="70" y1="57" x2="82" y2="65" />
    <text x="70" y="78" text-anchor="middle" dominant-baseline="auto">User</text>
  </g>
  <g class="seq-participant" data-participant-id="Skill">
    <rect x="370.7" y="20" width="175.4" height="40" rx="5" />
    <text x="458.4" y="40" text-anchor="middle" dominant-baseline="central">/ai-placeholder skill</text>
  </g>
  <g class="seq-participant" data-participant-id="MCP">
    <rect x="684.55" y="20" width="104.7" height="40" rx="5" />
    <text x="736.9" y="40" text-anchor="middle" dominant-baseline="central">mdship MCP</text>
  </g>
  <g class="seq-participant" data-participant-id="File">
    <rect x="997.6" y="20" width="100" height="40" rx="5" />
    <text x="1047.6" y="40" text-anchor="middle" dominant-baseline="central">File</text>
  </g>
</svg>